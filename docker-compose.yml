# Токен и ADMIN_IDS только в .env (файл в .gitignore). Не прописывать их здесь.
services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: beauty_salons_demo_bot:latest
    container_name: beauty_salons_demo_bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./leads.json:/app/leads.json
      - ./applications.json:/app/applications.json
      - ./activity_log.json:/app/activity_log.json
      - ./hot_leads_all.json:/app/hot_leads_all.json
